<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Fondo oscuro futurista -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#141a24" />
      <stop offset="100%" stop-color="#05080c" />
    </radialGradient>
    
    <!-- Brillo naranja de neón -->
    <radialGradient id="neon-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff7700" stop-opacity="1" />
      <stop offset="50%" stop-color="#ff4400" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0" />
    </radialGradient>

    <!-- Degradado lineal metálico para el anillo -->
    <linearGradient id="metal-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaa44" />
      <stop offset="50%" stop-color="#ff6600" />
      <stop offset="100%" stop-color="#aa2200" />
    </linearGradient>

    <!-- Filtro de sombra difusa para el resplandor de neón -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo de la App -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Efecto de resplandor de fondo -->
  <circle cx="256" cy="256" r="180" fill="url(#neon-glow)" filter="url(#glow)" opacity="0.6" />

  <!-- Anillo exterior holográfico -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#metal-ring)" stroke-width="12" filter="url(#glow)" />

  <!-- Círculos concéntricos de datos (Estilo Sci-Fi/Orbitas) -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#ff7700" stroke-width="2" stroke-dasharray="10, 15" opacity="0.7" />
  <circle cx="256" cy="256" r="70" fill="none" stroke="#ff5500" stroke-width="1.5" stroke-dasharray="40, 8" opacity="0.8" />

  <!-- Orbe central (El núcleo de ANCSTR) -->
  <circle cx="256" cy="256" r="40" fill="#ffffff" filter="url(#glow)" />
  <circle cx="256" cy="256" r="30" fill="#ff7700" opacity="0.8" />
  <circle cx="256" cy="256" r="15" fill="#05080c" />
</svg>
